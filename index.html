<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieVerse</title>

    <link rel="stylesheet" href="style.css">

    <!-- فونت -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">🎬 MovieVerse</div>

    <nav>
        <ul>
            <li><a href="#">خانه</a></li>
            <li><a href="#">فیلم‌ها</a></li>
            <li><a href="#">سریال‌ها</a></li>
            <li><a href="#">محبوب‌ترین‌ها</a></li>
            <li><a href="#">تماس</a></li>
        </ul>
    </nav>

    <button class="login-btn">
        ورود
    </button>
</header>

<section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>دنیای فیلم و سریال</h1>

        <p>
            جدیدترین فیلم‌ها و سریال‌های دنیا را با بهترین کیفیت پیدا کن.
        </p>

        <button class="watch-btn">
            شروع تماشا
        </button>

    </div>

</section>
<section class="movies">

    <h2>🔥 فیلم‌های ترند</h2>

    <div class="movie-container">

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg" alt="Interstellar">
            <h3>Interstellar</h3>
            <button>مشاهده</button>
        </div>

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg" alt="Joker">
            <h3>Joker</h3>
            <button>مشاهده</button>
        </div>

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg" alt="Avatar">
            <h3>Avatar</h3>
            <button>مشاهده</button>
        </div>

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg" alt="Batman">
            <h3>The Batman</h3>
            <button>مشاهده</button>
        </div>

    </div>

</section>
    
</body>
</html>
